<!DOCTYPE html>
<html lang="en" data-theme="forest">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Camera - Live Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="/templates/events.js"></script>
</head>
<body class="min-h-screen pb-24">
    <div class="drawer lg:drawer-open">
        <input id="sidebar-drawer" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content p-4 md:p-8">
            <div class="flex justify-between items-center mb-4">
                <label for="sidebar-drawer" class="btn btn-ghost btn-sm lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </label>
                <h1 class="text-2xl md:text-3xl font-bold text-primary">Live Camera</h1>
                <div class="w-10"></div>
            </div>
        
        <div class="flex flex-wrap items-center gap-2 mb-4">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-error animate-pulse"></div>
            <span id="status-text" class="text-sm text-base-content/70">Connecting...</span>
            <div id="camera-badge" class="badge badge-info">Loading...</div>
            <div id="model-badge" class="badge badge-neutral">Loading...</div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="card bg-base-300 shadow-xl">
                    <figure class="bg-base-200 relative">
                        <img id="camera-image" src="/video_feed" alt="Camera Feed" class="w-full">
                        <button onclick="toggleFullscreen()" class="absolute bottom-3 right-3 btn btn-circle btn-sm btn-ghost opacity-70 hover:opacity-100 bg-black/50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                            </svg>
                        </button>
                    </figure>
                </div>
            </div>
            
            <div class="space-y-4">
                <div class="card bg-base-300 shadow-xl">
                    <div class="card-body">
                        <h2 class="card-title text-primary">Detected Objects</h2>
                        <ul id="object-list" class="menu bg-base-100 rounded-lg p-2 max-h-64 overflow-y-auto">
                            <li class="menu-title text-base-content/60">No objects detected</li>
                        </ul>
                    </div>
                </div>
                
                <div class="card bg-base-300 shadow-xl">
                    <div class="card-body">
                        <h2 class="card-title text-primary">Statistics</h2>
                        <div class="stats stats-vertical lg:stats-horizontal shadow w-full">
                            <div class="stat p-4">
                                <div class="stat-title">Total</div>
                                <div id="total-count" class="stat-value text-primary">0</div>
                            </div>
                            <div class="stat p-4">
                                <div class="stat-title">Persons</div>
                                <div id="person-count" class="stat-value text-secondary">0</div>
                            </div>
                            <div class="stat p-4">
                                <div class="stat-title">Confidence</div>
                                <div id="highest-confidence" class="stat-value text-accent">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2">
        <button onclick="takeScreenshot()" class="btn btn-sm md:btn-lg btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            Screenshot
        </button>
    </div>

    <dialog id="logs_modal" class="modal">
        <div class="modal-box max-w-2xl max-h-[80vh]">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h3 class="font-bold text-lg mb-4">Server Logs</h3>
            <div class="bg-base-100 rounded-lg p-4 h-96 overflow-y-auto font-mono text-sm">
                <div id="logs-container" class="space-y-1">
                    <p class="text-base-content/50">Loading logs...</p>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
                <button onclick="fetchLogs()" class="btn btn-ghost">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Refresh
                </button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <dialog id="events_drawer" class="drawer drawer-end z-50">
        <input id="events-drawer-toggle" type="checkbox" class="drawer-toggle" />
        <div class="drawer-side">
            <label for="events-drawer-toggle" class="drawer-overlay"></label>
            <div class="menu p-4 w-80 min-h-full bg-base-200 text-base-content">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg">Event History</h3>
                    <button onclick="fetchEvents()" class="btn btn-ghost btn-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
                <div id="events-list" class="space-y-2">
                    <p class="text-base-content/50 text-sm">Loading...</p>
                </div>
            </div>
        </div>
    </dialog>

    <script>
        let ws;
        
        async function fetchModelInfo() {
            try {
                const resp = await fetch('/api/model');
                const data = await resp.json();
                document.getElementById('model-badge').textContent = `${data.model} • ${data.speed_ms}ms`;
            } catch (e) {
                console.error('Failed to fetch model info:', e);
            }
            try {
                const resp = await fetch('/api/camera');
                const data = await resp.json();
                document.getElementById('camera-badge').textContent = `${data.type} • ${data.resolution} • ${data.fps}fps`;
            } catch (e) {
                console.error('Failed to fetch camera info:', e);
            }
            setTimeout(fetchModelInfo, 5000);
        }
        
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = () => {
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');
                dot.className = 'w-3 h-3 rounded-full bg-success';
                dot.classList.remove('animate-pulse');
                text.textContent = 'Connected';
                fetchModelInfo();
            };
            
            ws.onclose = () => {
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');
                dot.className = 'w-3 h-3 rounded-full bg-error animate-pulse';
                text.textContent = 'Reconnecting...';
                setTimeout(connect, 2000);
            };
            
            ws.onerror = () => {
                ws.close();
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'detections') {
                    updateDetections(msg.data);
                }
            };
        }
        
        function updateDetections(detections) {
            const list = document.getElementById('object-list');
            
            if (detections.length === 0) {
                list.innerHTML = '<li class="menu-title text-base-content/60">No objects detected</li>';
                return;
            }
            
            list.innerHTML = detections.map(d => {
                const conf = (d.confidence * 100).toFixed(1);
                const isPerson = d.class.toLowerCase() === 'person';
                const colorClass = isPerson ? 'text-secondary' : 'text-primary';
                return `<li><a class="${colorClass}"><span class="font-bold capitalize">${d.class}</span><span class="badge badge-ghost">${conf}%</span></a></li>`;
            }).join('');
            
            document.getElementById('total-count').textContent = detections.length;
            document.getElementById('person-count').textContent = detections.filter(d => d.class.toLowerCase() === 'person').length;
            const highest = Math.max(...detections.map(d => d.confidence));
            document.getElementById('highest-confidence').textContent = highest > 0 ? `${(highest * 100).toFixed(1)}%` : '-';
        }
        
        function toggleFullscreen() {
            const img = document.getElementById('camera-image');
            if (!document.fullscreenElement) {
                img.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        function takeScreenshot() {
            fetch('/screenshot')
                .then(response => response.blob())
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `screenshot-${Date.now()}.jpg`;
                    a.click();
                    URL.revokeObjectURL(url);
                });
        }
        
        async function fetchLogs() {
            const container = document.getElementById('logs-container');
            try {
                const response = await fetch('/logs');
                const data = await response.json();
                
                if (data.logs.length === 0) {
                    container.innerHTML = '<p class="text-base-content/50">No logs yet</p>';
                } else {
                    container.innerHTML = data.logs.map(log => {
                        let levelColor = 'text-info';
                        if (log.level === 'WARNING') levelColor = 'text-warning';
                        if (log.level === 'ERROR') levelColor = 'text-error';
                        return `<div><span class="text-base-content/50">${log.timestamp}</span> <span class="${levelColor}">[${log.level}]</span> ${log.message}</div>`;
                    }).reverse().join('');
                }
                
                document.getElementById('logs_modal').showModal();
            } catch (err) {
                container.innerHTML = `<p class="text-error">Failed to load logs: ${err.message}</p>`;
                document.getElementById('logs_modal').showModal();
            }
        }
        
        connect();
    </script>
    
    <div class="drawer-side">
        <label for="sidebar-drawer" class="drawer-overlay"></label>
        <div class="menu p-4 w-64 min-h-full bg-base-200">
            <h2 class="text-xl font-bold mb-6 text-primary">Menu</h2>
            <ul class="space-y-2">
                <li>
                    <a href="/stream" class="px-4 py-3 rounded-lg hover:bg-base-300 flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        Live Camera
                    </a>
                </li>
                <li>
                    <a href="/timelapse" class="px-4 py-3 rounded-lg hover:bg-base-300 flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        Timelapse
                    </a>
                </li>
                <li>
                    <button onclick="showEventsDrawer()" class="w-full text-left px-4 py-3 rounded-lg hover:bg-base-300 flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Event History
                    </button>
                </li>
                <li>
                    <button onclick="fetchLogs()" class="w-full text-left px-4 py-3 rounded-lg hover:bg-base-300 flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                        Server Logs
                    </button>
                </li>
                <li>
                    <a href="https://t.me/jsaicamerabot" target="_blank" class="px-4 py-3 rounded-lg hover:bg-base-300 flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                        Telegram Bot
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
