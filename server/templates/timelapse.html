<!DOCTYPE html>
<html lang="en" data-theme="forest">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timelapse Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="/templates/events.js"></script>
</head>
<body class="min-h-screen pb-24" data-theme="forest">
    <div class="drawer lg:drawer-open">
        <input id="sidebar-drawer" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content p-4 md:p-8">
            <div class="flex justify-between items-center mb-4">
                <label for="sidebar-drawer" class="btn btn-ghost btn-sm lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </label>
                <h1 class="text-2xl md:text-3xl font-bold text-primary">Timelapse Viewer</h1>
                <div class="w-10"></div>
            </div>
            
            <div class="card bg-base-300 shadow-xl mb-6">
                <div class="card-body p-4">
                    <button id="filters-toggle" onclick="toggleFilters()" class="btn btn-ghost btn-sm w-full flex justify-between items-center mb-2">
                        <span class="font-medium">Filters</span>
                        <svg id="filters-chevron" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div id="filters-content" class="hidden">
                        <div class="flex flex-col md:flex-row gap-4">
                            <div class="form-control">
                                <label class="label">
                                    <span class="label-text">Date</span>
                                </label>
                                <input type="date" id="date-input" class="input input-bordered" onchange="loadTimelapse()">
                            </div>
                            <div class="form-control">
                                <label class="label">
                                    <span class="label-text">Jump to Hour</span>
                                </label>
                                <select id="hour-select" class="select select-bordered" onchange="jumpToHour(this.value)">
                                    <option value="">All Day</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card bg-base-300 shadow-xl">
                <div class="card-body">
                    <div class="flex flex-col gap-4">
                        <div class="order-1 lg:order-0">
                            <div class="mt-4 lg:mt-0">
                                <div class="flex gap-2 mb-2">
                                    <button id="play-btn" onclick="togglePlay()" class="btn btn-sm btn-primary" disabled>
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                        <span>Play</span>
                                    </button>
                                    <button id="speed-1x-btn" onclick="setSpeed(500)" class="btn btn-sm btn-secondary btn-active" disabled>1x</button>
                                    <button id="speed-5x-btn" onclick="setSpeed(100)" class="btn btn-sm btn-secondary" disabled>5x</button>
                                    <button id="speed-10x-btn" onclick="setSpeed(50)" class="btn btn-sm btn-accent" disabled>10x</button>
                                </div>
                                <div class="flex justify-between text-sm text-base-content/60 mb-2">
                                    <span id="current-time">--:--:--</span>
                                    <span id="image-count">0 images</span>
                                </div>
                                <input type="range" id="timeline-slider" min="0" max="100" value="0" class="range range-primary w-full" disabled>
                                <div class="flex justify-between text-xs text-base-content/40 mt-1">
                                    <span>Start</span>
                                    <span>End</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="order-0 lg:order-1">
                            <div id="main-image-container" class="relative bg-base-100 rounded-lg overflow-hidden cursor-pointer" onclick="showMainImageModal()">
                                <img id="main-image" src="" alt="Timelapse" class="w-full hidden">
                                <div id="loading-indicator" class="absolute inset-0 flex items-center justify-center">
                                    <span class="loading loading-spinner loading-lg text-primary"></span>
                                </div>
                                <div id="no-images" class="absolute inset-0 flex items-center justify-center hidden">
                                    <p class="text-base-content/50">No images for this hour</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center mt-4">
                        <h3 class="text-sm font-medium">Alert Events</h3>
                        <button id="toggle-all-btn" onclick="toggleAllThumbnails()" class="btn btn-xs btn-ghost">
                            Show All Images
                        </button>
                    </div>
                    
                    <div id="thumbnails" class="flex flex-wrap gap-2 mt-2">
                    </div>
                    
                    <h3 id="all-thumbnails-title" class="hidden text-sm font-medium mt-4">All Thumbnails</h3>
                    
                    <div id="all-thumbnails" class="hidden flex flex-wrap gap-1 mt-2">
                    </div>
                </div>
            </div>
        </div>
        
        <div class="drawer-side">
            <label for="sidebar-drawer" class="drawer-overlay"></label>
            <div class="menu p-4 w-64 min-h-full bg-base-200">
                <h2 class="text-xl font-bold mb-6 text-primary">Menu</h2>
                <ul class="space-y-2">
                    <li>
                        <a href="/stream" class="px-4 py-3 rounded-lg hover:bg-base-300 flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                            </svg>
                            Live Camera
                        </a>
                    </li>
                    <li>
                        <a href="/timelapse" class="px-4 py-3 rounded-lg bg-base-300 flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            Timelapse
                        </a>
                    </li>
                    <li>
                        <button onclick="fetchEvents()" class="w-full text-left px-4 py-3 rounded-lg hover:bg-base-300 flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            Event History
                        </button>
                    </li>
                    <li>
                        <button onclick="fetchLogs()" class="w-full text-left px-4 py-3 rounded-lg hover:bg-base-300 flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                            </svg>
                            Server Logs
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    
    <dialog id="events_drawer" class="drawer drawer-end z-50">
        <input id="events-drawer-toggle" type="checkbox" class="drawer-toggle" />
        <div class="drawer-side">
            <label for="events-drawer-toggle" class="drawer-overlay"></label>
            <div class="menu p-4 w-80 min-h-full bg-base-200 text-base-content">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg">Event History</h3>
                    <button onclick="fetchEvents()" class="btn btn-ghost btn-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
                <div id="events-list" class="space-y-2">
                    <p class="text-base-content/50 text-sm">Loading...</p>
                </div>
            </div>
        </div>
    </dialog>
    
    <dialog id="alert_modal" class="modal">
        <div class="modal-box max-w-2xl">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h3 class="font-bold text-lg mb-2">Detection Alert</h3>
            <img id="alert-modal-image" class="rounded-lg w-full mb-4" src="">
            <div class="bg-base-300 rounded-lg p-4 mb-4">
                <p class="text-sm text-base-content/60 mb-1">Detected Objects</p>
                <p id="alert-modal-objects" class="font-medium text-lg"></p>
            </div>
            <p id="alert-modal-time" class="text-sm text-base-content/60"></p>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>
    
    <dialog id="logs_modal" class="modal">
        <div class="modal-box max-w-2xl max-h-[80vh]">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h3 class="font-bold text-lg mb-4">Server Logs</h3>
            <div class="bg-base-100 rounded-lg p-4 h-96 overflow-y-auto font-mono text-sm">
                <div id="logs-container" class="space-y-1">
                    <p class="text-base-content/50">Loading logs...</p>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <script>
        let allImages = [];
        let alertImages = new Map();
        let currentIndex = 0;
        let selectedDate = '';
        let allThumbnailsVisible = false;
        let hourIndices = {};
        let visibleThumbnailCount = 100;
        const THUMBNAIL_BATCH_SIZE = 100;
        
        let isPlaying = false;
        let playInterval = null;
        let playSpeed = 500;
        const DEFAULT_SPEED = 500;
        
        function extractTimeFromPath(imgPath) {
            const urlPath = imgPath.includes('path=') ? imgPath.split('path=')[1] : imgPath;
            const parts = urlPath.split('/');
            const filename = parts[parts.length - 1];
            const timeParts = filename.replace('.jpg', '').split('_');
            const hour = parts[parts.length - 2];
            const minutes = timeParts[0];
            const seconds = timeParts[1];
            return `${hour}:${minutes}:${seconds}`;
        }
        
        function init() {
            const params = new URLSearchParams(window.location.search);
            const urlDate = params.get('date');
            const urlHour = params.get('hour');
            const urlMinute = params.get('minute');
            const urlSecond = params.get('second');
            
            if (urlDate || urlHour || urlMinute || urlSecond) {
                document.getElementById('filters-content').classList.remove('hidden');
                document.getElementById('filters-chevron').classList.add('rotate-180');
            }
            
            const today = new Date().toLocaleDateString('en-CA');
            selectedDate = urlDate || today;
            
            document.getElementById('date-input').value = selectedDate;
            
            loadTimelapse().then(() => {
                if (urlMinute !== null && urlSecond !== null) {
                    const targetTime = `${urlMinute}_${urlSecond.padStart(2, '0')}`;
                    const targetIdx = allImages.findIndex(img => {
                        if (!img.includes(targetTime)) return false;
                        if (urlHour) return img.includes(`/${urlHour}/`);
                        return true;
                    });
                    if (targetIdx >= 0) {
                        selectImageAndScroll(targetIdx);
                        visibleThumbnailCount = Math.min(targetIdx + 10, Math.max(100, allImages.length));
                        if (visibleThumbnailCount > 100) {
                            allThumbnailsVisible = true;
                            document.getElementById('all-thumbnails').classList.remove('hidden');
                            document.getElementById('toggle-all-btn').textContent = 'Hide All Images';
                            renderAllThumbnails();
                        } else {
                            visibleThumbnailCount = 100;
                            renderAllThumbnails();
                        }
                        if (urlHour) {
                            document.getElementById('hour-select').value = urlHour;
                        }
                    }
                } else if (allImages.length > 0) {
                    selectImage(0);
                }
            });
        }
        
        async function loadTimelapse() {
            if (isPlaying) togglePlay();
            
            selectedDate = document.getElementById('date-input').value;
            alertImages.clear();
            visibleThumbnailCount = 100;
            
            const mainImg = document.getElementById('main-image');
            const loading = document.getElementById('loading-indicator');
            const noImages = document.getElementById('no-images');
            const slider = document.getElementById('timeline-slider');
            const thumbnails = document.getElementById('thumbnails');
            
            mainImg.classList.add('hidden');
            noImages.classList.add('hidden');
            loading.classList.remove('hidden');
            slider.disabled = true;
            document.getElementById('play-btn').disabled = true;
            document.getElementById('speed-1x-btn').disabled = true;
            document.getElementById('speed-5x-btn').disabled = true;
            document.getElementById('speed-10x-btn').disabled = true;
            thumbnails.innerHTML = '';

            try {
                const [imagesRes, alertsRes] = await Promise.all([
                    fetch(`/timelapse/images/all?date=${selectedDate}`),
                    fetch(`/timelapse/alerts/all?date=${selectedDate}`)
                ]);
                const imagesData = await imagesRes.json();
                const alertsData = await alertsRes.json();
                
                alertsData.alerts.forEach(alert => {
                    alertImages.set(alert.path, alert.objects);
                });
                
                allImages = imagesData.images.reverse();
                currentIndex = 0;
                
                hourIndices = {};
                allImages.forEach((img, idx) => {
                    const urlPath = img.includes('path=') ? img.split('path=')[1] : img;
                    const parts = urlPath.split('/');
                    const hour = parts[parts.length - 2];
                    if (!hourIndices[hour]) hourIndices[hour] = idx;
                });
                
                const hourSelect = document.getElementById('hour-select');
                hourSelect.innerHTML = '<option value="">All Day</option>';
                Object.keys(hourIndices).sort().forEach(hour => {
                    hourSelect.innerHTML += `<option value="${hour}">${hour}:00 - ${hour}:59</option>`;
                });
                
                console.log('Loaded:', allImages.length, 'images,', alertImages.size, 'alerts');
                
                document.getElementById('image-count').textContent = `${allImages.length} images (${alertImages.size} alerts)`;
                
                if (allImages.length === 0) {
                    loading.classList.add('hidden');
                    noImages.classList.remove('hidden');
                    slider.max = 0;
                    return;
                }
                
                slider.max = allImages.length - 1;
                slider.disabled = false;
                document.getElementById('play-btn').disabled = false;
                document.getElementById('speed-1x-btn').disabled = false;
                document.getElementById('speed-5x-btn').disabled = false;
                document.getElementById('speed-10x-btn').disabled = false;
                
                thumbnails.innerHTML = allImages
                    .filter(img => alertImages.has(img))
                    .map(img => {
                        const timeStr = extractTimeFromPath(img);
                        const timeShort = timeStr.slice(0, 5);
                        return `
                            <div class="relative group cursor-pointer" onclick="selectImageAndScroll(allImages.indexOf('${img}')); showAlertModal('${img}')">
                                <img src="${img}" alt="" class="w-full h-12 lg:h-16 object-cover rounded ring-2 ring-error hover:ring-4 transition-all">
                                <div class="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-xs px-1 py-0.5 rounded-b text-center">
                                    <span class="hidden md:inline">${timeStr}</span>
                                    <span class="md:hidden">${timeShort}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                
                renderAllThumbnails();
                loading.classList.add('hidden');
            } catch (err) {
                console.error('Failed to load timelapse:', err);
                loading.classList.add('hidden');
                noImages.classList.remove('hidden');
            }
        }
        
        function renderAllThumbnails() {
            const container = document.getElementById('all-thumbnails');
            const visibleImages = allImages.slice(0, visibleThumbnailCount);
            
            if (allThumbnailsVisible) {
                container.innerHTML = visibleImages.map((img, idx) => {
                    const isAlert = alertImages.has(img);
                    const ringClass = isAlert ? 'ring-2 ring-error' : '';
                    const timeStr = extractTimeFromPath(img);
                    const timeShort = timeStr.slice(0, 5);
                    return `
                        <div class="relative group cursor-pointer thumbnail-item" data-idx="${idx}">
                            <img data-src="${img}" alt="" class="w-full h-12 lg:h-16 object-cover rounded ${ringClass} hover:ring-2 hover:ring-primary transition-all lazy-img">
                            <div class="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-xs px-1 py-0.5 rounded-b text-center">
                                <span class="hidden md:inline">${timeStr}</span>
                                <span class="md:hidden">${timeShort}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                
                container.innerHTML += `
                    <button id="load-more-btn" onclick="loadMoreThumbnails()" class="btn btn-sm btn-ghost w-full mt-2 col-span-12">
                        Load More (${allImages.length - visibleThumbnailCount} remaining)
                    </button>
                `;
                
                setupLazyLoading();
            } else {
                container.innerHTML = visibleImages.map((img, idx) => {
                    const isAlert = alertImages.has(img);
                    const ringClass = isAlert ? 'ring-2 ring-error' : '';
                    const timeStr = extractTimeFromPath(img);
                    const timeShort = timeStr.slice(0, 5);
                    return `
                        <div class="relative group cursor-pointer" onclick="selectImageAndScroll(${idx}); document.getElementById('alert_modal').close();">
                            <img src="${img}" alt="" class="w-full h-12 lg:h-16 object-cover rounded ${ringClass} hover:ring-2 hover:ring-primary transition-all">
                            <div class="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-xs px-1 py-0.5 rounded-b text-center">
                                <span class="hidden md:inline">${timeStr}</span>
                                <span class="md:hidden">${timeShort}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                
                const remaining = allImages.length - visibleThumbnailCount;
                if (remaining > 0) {
                    container.innerHTML += `
                        <button onclick="loadMoreThumbnails()" class="btn btn-sm btn-ghost w-full mt-2">
                            Load More (${remaining} remaining)
                        </button>
                    `;
                }
            }
        }
        
        let lazyObserver = null;
        
        function setupLazyLoading() {
            if (lazyObserver) {
                lazyObserver.disconnect();
            }
            
            lazyObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        if (img.dataset.src) {
                            img.src = img.dataset.src;
                            img.removeAttribute('data-src');
                            img.classList.remove('lazy-img');
                        }
                    }
                });
            }, { rootMargin: '200px' });
            
            document.querySelectorAll('.lazy-img').forEach(img => {
                lazyObserver.observe(img);
            });
        }
        
        function loadMoreThumbnails() {
            visibleThumbnailCount = Math.min(visibleThumbnailCount + THUMBNAIL_BATCH_SIZE, allImages.length);
            
            if (allThumbnailsVisible) {
                const container = document.getElementById('all-thumbnails');
                const loadMoreBtn = document.getElementById('load-more-btn');
                const startIdx = visibleThumbnailCount - THUMBNAIL_BATCH_SIZE;
                const endIdx = visibleThumbnailCount;
                
                const newItems = allImages.slice(startIdx, endIdx).map((img, i) => {
                    const idx = startIdx + i;
                    const isAlert = alertImages.has(img);
                    const ringClass = isAlert ? 'ring-2 ring-error' : '';
                    const timeStr = extractTimeFromPath(img);
                    return `
                        <div class="relative group cursor-pointer thumbnail-item" data-idx="${idx}">
                            <img data-src="${img}" alt="" class="w-full h-12 lg:h-16 object-cover rounded ${ringClass} hover:ring-2 hover:ring-primary transition-all lazy-img">
                            <div class="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-xs px-1 py-0.5 rounded-b text-center">
                                ${timeStr}
                            </div>
                        </div>
                    `;
                }).join('');
                
                loadMoreBtn.insertAdjacentHTML('beforebegin', newItems);
                setupLazyLoading();
                
                const remaining = allImages.length - visibleThumbnailCount;
                if (remaining > 0) {
                    loadMoreBtn.textContent = `Load More (${remaining} remaining)`;
                } else {
                    loadMoreBtn.remove();
                }
            } else {
                renderAllThumbnails();
            }
        }
        
        function toggleAllThumbnails() {
            const container = document.getElementById('all-thumbnails');
            const title = document.getElementById('all-thumbnails-title');
            const btn = document.getElementById('toggle-all-btn');
            allThumbnailsVisible = !allThumbnailsVisible;
            
            if (allThumbnailsVisible) {
                visibleThumbnailCount = THUMBNAIL_BATCH_SIZE;
                container.classList.remove('hidden');
                title.classList.remove('hidden');
                btn.textContent = 'Hide All Images';
                renderAllThumbnails();
            } else {
                if (lazyObserver) {
                    lazyObserver.disconnect();
                    lazyObserver = null;
                }
                container.classList.add('hidden');
                title.classList.add('hidden');
                btn.textContent = 'Show All Images';
                visibleThumbnailCount = THUMBNAIL_BATCH_SIZE;
                container.innerHTML = '';
            }
        }
        
        function toggleFilters() {
            const content = document.getElementById('filters-content');
            const chevron = document.getElementById('filters-chevron');
            content.classList.toggle('hidden');
            chevron.classList.toggle('rotate-180');
        }
        
        function jumpToHour(hour) {
            if (hour === '' || !hourIndices[hour]) {
                selectImageAndScroll(allImages.length - 1);
                return;
            }
            selectImageAndScroll(hourIndices[hour]);
        }
        
        function selectImage(index) {
            currentIndex = index;
            const mainImg = document.getElementById('main-image');
            mainImg.src = allImages[index];
            mainImg.classList.remove('hidden');
            
            document.getElementById('timeline-slider').value = index;
            
            document.getElementById('current-time').textContent = extractTimeFromPath(allImages[index]);
        }
        
        function selectImageAndScroll(index) {
            selectImage(index);
            document.getElementById('main-image-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function showAlertModal(imgPath) {
            document.getElementById('alert-modal-objects').textContent = alertImages.get(imgPath);
            document.getElementById('alert-modal-image').src = imgPath;
            document.getElementById('alert-modal-time').textContent = `${selectedDate} ${extractTimeFromPath(imgPath)}`;
            document.getElementById('alert_modal').showModal();
        }
        
        function showMainImageModal() {
            const imgPath = allImages[currentIndex];
            const objects = alertImages.has(imgPath) ? alertImages.get(imgPath) : 'No detections';
            
            document.getElementById('alert-modal-objects').textContent = objects;
            document.getElementById('alert-modal-image').src = imgPath;
            document.getElementById('alert-modal-time').textContent = `${selectedDate} ${extractTimeFromPath(imgPath)}`;
            document.getElementById('alert_modal').showModal();
        }
        
        function togglePlay() {
            const playBtn = document.getElementById('play-btn');
            
            if (isPlaying) {
                clearInterval(playInterval);
                playInterval = null;
                isPlaying = false;
                playBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><span>Play</span>`;
            } else {
                isPlaying = true;
                setSpeed(playSpeed);
                playBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg><span>Pause</span>`;
            }
        }
        
        function setSpeed(speed) {
            playSpeed = speed;
            
            const btn1x = document.getElementById('speed-1x-btn');
            const btn5x = document.getElementById('speed-5x-btn');
            const btn10x = document.getElementById('speed-10x-btn');
            
            btn1x.classList.remove('btn-secondary', 'btn-active');
            btn5x.classList.remove('btn-secondary', 'btn-active');
            btn10x.classList.remove('btn-accent', 'btn-active');
            
            if (speed === 500) {
                btn1x.classList.add('btn-active');
                btn1x.classList.add('btn-secondary');
            } else if (speed === 100) {
                btn5x.classList.add('btn-active');
                btn5x.classList.add('btn-secondary');
            } else if (speed === 50) {
                btn10x.classList.add('btn-active');
                btn10x.classList.add('btn-accent');
            }
            
            if (isPlaying) {
                clearInterval(playInterval);
                playInterval = setInterval(() => {
                    if (currentIndex < allImages.length - 1) {
                        selectImage(currentIndex + 1);
                    } else {
                        togglePlay();
                    }
                }, playSpeed);
            }
        }
        
        document.getElementById('timeline-slider').addEventListener('input', (e) => {
            selectImage(parseInt(e.target.value));
        });
        
        document.getElementById('all-thumbnails').addEventListener('click', (e) => {
            const item = e.target.closest('.thumbnail-item');
            if (item) {
                const idx = parseInt(item.dataset.idx);
                selectImageAndScroll(idx);
                document.getElementById('alert_modal').close();
            }
        });
        
        init();
    </script>
</body>
</html>
